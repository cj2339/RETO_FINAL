<!DOCTYPE html>
<html lang="en">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Imperial Maritime</title>
	    <link rel="icon" type="image/png" href="../../../images/icon.png"> 
	    <link rel="stylesheet" href="../css/style.css">
	</head>

<nav>
    <div class="brand-container">
        <img src="../../../images/icon.png" alt="Logo" class="nav-logo">
        <span class="brand">Imperial Maritime</span>
    </div>
</nav>

<div class="hero">
    <h1>Imperial Maritime</h1>
    <p>Cruise management system — Import your XML and visualise data through XSLT transformations</p>
</div>

<div class="container">
    <div class="upload-area" id="dropZone">
        <h3>Import XML data</h3>
        <p>Paste XML content below or **drag and drop** a .xml file</p>
        <textarea id="xmlInput" placeholder="Paste your XML file content here..."></textarea>
        <br>
        <label class="btn" for="fileInput">Upload .xml file</label>
        <input type="file" id="fileInput" accept=".xml">
        <button onclick="procesarXML()">Process XML with XSLT</button>
        <br>
        <div id="status" class="status"></div>
    </div>

    <div id="resultado"></div>
</div>

<footer>&copy; 2026 Imperial Maritime. All rights reserved.</footer>

<script src="../js/main.js"></script>
<script src="../js/fileHandler.js"></script>

</body>
</html>
